<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class2Cal - Gerador de Horários</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .slide-in { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-purple-50 min-h-screen text-slate-800">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-indigo-200">C</div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900">Class2Cal</h1>
            </div>
            <button onclick="document.getElementById('file-upload').click()" class="text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition">
                Importar CSV/JSON
            </button>
            <input type="file" id="file-upload" accept=".csv,.json" class="hidden" onchange="handleFileUpload(this)">
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Panel: Settings & Form -->
            <div class="lg:col-span-4 space-y-6">
                <!-- Semester Info -->
                <div class="bg-white rounded-2xl p-6 shadow-xl shadow-slate-200/50 border border-slate-100">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Semestre
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Nome do Calendário</label>
                            <input type="text" id="cal-name" value="Semestre 2025-2" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Início</label>
                                <input type="date" id="start-date" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Fim</label>
                                <input type="date" id="end-date" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Add Course Form -->
                <div class="bg-white rounded-2xl p-6 shadow-xl shadow-slate-200/50 border border-slate-100 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-indigo-50 rounded-full -mr-10 -mt-10 blur-2xl"></div>
                    <h2 class="text-lg font-bold mb-4 relative">Adicionar Disciplina</h2>
                    <div class="space-y-3 relative">
                        <input type="text" id="c-alias" placeholder="Sigla (ex: EDO)" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <input type="text" id="c-fullname" placeholder="Nome Completo" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="c-prof" placeholder="Professor" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                            <input type="text" id="c-room" placeholder="Sala" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        </div>
                        <input type="text" id="c-codes" placeholder="Códigos (ex: 24M12, 6N34)" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <button onclick="addCourse()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold py-2.5 rounded-lg transition active:scale-95 shadow-lg shadow-slate-900/20">
                            Adicionar
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Course List -->
            <div class="lg:col-span-8 flex flex-col h-full">
                <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-xl shadow-slate-200/50 border border-slate-100 flex-1 flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-bold flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
                            Disciplinas
                            <span id="course-count" class="text-xs font-normal text-slate-400 ml-1">(0)</span>
                        </h2>
                        <button onclick="clearCourses()" class="text-xs text-red-500 hover:text-red-700 font-semibold transition">Limpar Tudo</button>
                    </div>

                    <!-- List Container -->
                    <div id="course-list" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar" style="max-height: 500px;">
                        <!-- Empty State -->
                        <div id="empty-state" class="flex flex-col items-center justify-center h-full text-slate-400 py-12">
                            <svg class="w-12 h-12 mb-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            <p class="text-sm">Nenhuma disciplina adicionada ainda.</p>
                        </div>
                    </div>

                    <!-- Footer Action -->
                    <div class="mt-6 pt-6 border-t border-slate-100">
                        <button onclick="generateCalendar()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-lg font-bold py-4 rounded-xl shadow-xl shadow-indigo-600/30 transition transform hover:-translate-y-1 active:translate-y-0">
                            ✨ Gerar Calendário (.ics)
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
